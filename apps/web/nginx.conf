server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        set $backend_upstream http://backend:3000;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /ai/ {
        set $ai_upstream http://ai:3001;
        proxy_pass $ai_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /minio/ {
        set $minio_upstream http://minio:9000;
        proxy_pass $minio_upstream;
    }

    location /socket.io/ {
        set $socket_upstream http://backend:3000;
        proxy_pass $socket_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
