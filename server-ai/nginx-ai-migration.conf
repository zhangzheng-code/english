# ============================================================
# Nginx 灰度割接配置 — AI 微服务迁移
# ============================================================
# 使用方式：将此文件内容替换原 nginx.conf 中的 location /ai/ 块
# 原 NestJS AI 服务（3001）→ 新 FastAPI AI 服务（3002）
# 主服务（backend:3000）不受影响
# ============================================================

# ---- AI 微服务路由（替换原 location /ai/ 块）----

# SSE 流式聊天 — 必须关闭缓冲，否则 Nginx 会等整个响应完成才转发
location /ai/v1/chat {
    proxy_pass http://fastapi-ai:3001;

    # SSE 核心配置：关闭缓冲 + 分块传输
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 300s;          # AI 生成可能较慢，超时设为 5 分钟
    chunked_transfer_encoding on;

    # 标准代理头
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Connection '';
    proxy_http_version 1.1;
}

# Prompt 列表 + 聊天历史 + 摘要触发 — 普通 HTTP，无需特殊处理
location /ai/v1/prompt/ {
    proxy_pass http://fastapi-ai:3001;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
}

location /ai/v1/chat/history {
    proxy_pass http://fastapi-ai:3001;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
}

location /ai/v1/digest/ {
    proxy_pass http://fastapi-ai:3001;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
}

# 健康检查端点
location = /ai/v1/ {
    proxy_pass http://fastapi-ai:3001;
    proxy_set_header Host $host;
}

# ---- 回退：未匹配的 /ai/ 请求仍走原 NestJS ----
# 如果你已经 100% 切换到 FastAPI，可以删除下面这个 location
